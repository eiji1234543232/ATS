<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ATS Portal - 候補者詳細</title>
<style>

*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a18;min-height:100vh;}
:root{
  --bg:#fff;--bg2:#f5f5f3;--bg3:#eeecea;
  --text:#1a1a18;--text2:#6b6b68;--text3:#a0a09c;
  --bdr:rgba(0,0,0,0.12);--bdr2:rgba(0,0,0,0.22);
  --pur:#534AB7;--pur-d:#3C3489;--pur-l:#EEEDFE;
  --grn-l:#E1F5EE;--grn:#085041;
  --red-l:#FCEBEB;--red:#791F1F;
  --amb-l:#FAEEDA;--amb:#633806;
  --blu-l:#E6F1FB;--blu:#0C447C;
  --gry-l:#F1EFE8;--gry:#444441;
  --r-md:8px;--r-lg:12px;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2b;--text:#f0ede8;--text2:#a8a8a4;--text3:#6b6b68;--bdr:rgba(255,255,255,0.1);--bdr2:rgba(255,255,255,0.2);}
}
.btn{height:34px;padding:0 14px;font-size:13px;border:0.5px solid var(--bdr2);border-radius:var(--r-md);background:var(--bg);color:var(--text);cursor:pointer;white-space:nowrap;display:inline-flex;align-items:center;gap:6px;}
.btn:hover{background:var(--bg2);}
.btn.pri{background:var(--pur);color:#fff;border-color:var(--pur);}
.btn.pri:hover{background:var(--pur-d);}
.btn.sm{height:28px;font-size:12px;padding:0 10px;}
.btn.danger{color:#A32D2D;border-color:#F09595;}
.btn.danger:hover{background:var(--red-l);}
.badge{display:inline-block;font-size:11px;padding:2px 7px;border-radius:99px;white-space:nowrap;}
.stepb{display:inline-block;font-size:11px;padding:2px 7px;border-radius:4px;white-space:nowrap;}
.step-doc{background:var(--blu-l);color:var(--blu);}
.step-written{background:var(--pur-l);color:var(--pur-d);}
.step-1st{background:var(--amb-l);color:var(--amb);}
.step-2nd{background:#FAC775;color:var(--amb);}
.step-final{background:#FAECE7;color:#712B13;}
.step-offer{background:var(--grn-l);color:var(--grn);}
.st-pass{background:var(--grn-l);color:var(--grn);}
.st-fail{background:var(--red-l);color:var(--red);}
.st-hold{background:var(--gry-l);color:var(--gry);}
.st-new{background:var(--blu-l);color:var(--blu);}
.st-wd{background:#FBEAF0;color:#72243E;}
.tag{display:inline-block;font-size:11px;padding:2px 6px;border-radius:99px;margin:1px;}
.t-eng{background:var(--pur-l);color:var(--pur-d);}
.t-hr{background:var(--grn-l);color:var(--grn);}
.t-hot{background:#FAECE7;color:#712B13;}
.t-keep{background:var(--amb-l);color:var(--amb);}
.gm{color:#185FA5;font-weight:500;}.gf{color:#993556;font-weight:500;}
.navbar{height:52px;background:var(--bg);border-bottom:0.5px solid var(--bdr);display:flex;align-items:center;padding:0 1.25rem;gap:12px;position:sticky;top:0;z-index:50;}
.nmark{width:28px;height:28px;background:var(--pur);border-radius:6px;display:flex;align-items:center;justify-content:center;}
.ntitle{font-size:15px;font-weight:500;color:var(--text);}
.nspc{flex:1;}
.nusr{font-size:13px;color:var(--text2);}
.nbtn{height:30px;padding:0 12px;font-size:12px;border:0.5px solid var(--bdr2);border-radius:var(--r-md);background:transparent;color:var(--text2);cursor:pointer;}
.nbtn:hover{background:var(--bg2);}
.abody{padding:1.25rem;max-width:1200px;margin:0 auto;}
.toast{display:none;position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#2C2C2A;color:#F1EFE8;font-size:12px;padding:9px 18px;border-radius:var(--r-md);white-space:nowrap;z-index:9999;}
.toast.show{display:block;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;align-items:flex-start;justify-content:center;padding:40px 16px;}
.overlay.open{display:flex;}
.mbox{background:var(--bg);border:0.5px solid var(--bdr);border-radius:var(--r-lg);padding:1.25rem;width:100%;max-width:440px;max-height:calc(100vh - 80px);overflow-y:auto;}
.mbox h3{font-size:15px;font-weight:500;margin-bottom:1rem;}
.mtabs{display:grid;gap:4px;margin-bottom:1rem;}
.mtab{height:30px;font-size:12px;border:0.5px solid var(--bdr2);border-radius:var(--r-md);background:var(--bg);color:var(--text2);cursor:pointer;padding:0 4px;}
.mtab.active{background:var(--pur);color:#fff;border-color:var(--pur);}
.msearch{width:100%;height:32px;padding:0 10px;font-size:13px;border:0.5px solid var(--bdr2);border-radius:var(--r-md);background:var(--bg2);color:var(--text);outline:none;margin-bottom:8px;}
.msearch:focus{border-color:var(--pur);}
.olist{display:flex;flex-direction:column;gap:3px;max-height:180px;overflow-y:auto;}
.oitem{display:flex;align-items:center;gap:8px;padding:6px 10px;border:0.5px solid var(--bdr);border-radius:var(--r-md);cursor:pointer;font-size:13px;}
.oitem:hover{background:var(--bg2);}
.oitem.sel{background:var(--pur-l);border-color:#AFA9EC;}
.oitem input[type=radio]{width:13px;height:13px;accent-color:var(--pur);flex-shrink:0;}
.taggrid{display:flex;flex-wrap:wrap;gap:8px;padding:4px 0;}
.tagopt{padding:6px 12px;border:0.5px solid var(--bdr2);border-radius:99px;cursor:pointer;font-size:13px;color:var(--text2);}
.tagopt.tadd{background:var(--pur);color:#fff;border-color:var(--pur);}
.tagopt.tremove{background:var(--red-l);color:#A32D2D;border-color:#F09595;}
.macts{display:flex;gap:8px;margin-top:1rem;justify-content:flex-end;}
.titem,.fitem{padding:8px 10px;border:0.5px solid var(--bdr);border-radius:var(--r-md);cursor:pointer;margin-bottom:4px;}
.titem:hover,.fitem:hover{background:var(--bg2);}
.titem.sel,.fitem.sel{background:var(--pur-l);border-color:#AFA9EC;}
.tn,.fn{font-size:13px;font-weight:500;}
.td2,.fd{font-size:11px;color:var(--text2);margin-top:2px;}

.det-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;gap:8px;flex-wrap:wrap;padding:1.25rem 1.25rem 0;}
.dlayout{display:grid;grid-template-columns:230px 1fr;gap:14px;align-items:start;padding:0 1.25rem 1.25rem;}
@media(max-width:640px){.dlayout{grid-template-columns:1fr;}}
.dside{display:flex;flex-direction:column;gap:10px;}
.card{background:var(--bg);border:0.5px solid var(--bdr);border-radius:var(--r-lg);padding:13px 15px;}
.card-t{font-size:11px;font-weight:500;color:var(--text2);margin-bottom:8px;}
.ph{display:flex;flex-direction:column;align-items:center;text-align:center;padding-bottom:10px;border-bottom:0.5px solid var(--bdr);margin-bottom:10px;}
.av{width:56px;height:56px;border-radius:50%;overflow:hidden;background:var(--bg2);border:0.5px solid var(--bdr);display:flex;align-items:center;justify-content:center;margin-bottom:5px;cursor:pointer;}
.av img{width:100%;height:100%;object-fit:cover;}
.ph-hint{font-size:10px;color:var(--pur);cursor:pointer;margin-bottom:2px;}
.pname{font-size:15px;font-weight:500;margin-top:4px;}
.pid{font-size:10px;color:var(--text3);font-family:monospace;}
.irow{display:flex;align-items:flex-start;padding:3px 0;border-bottom:0.5px solid var(--bdr);}
.irow:last-child{border-bottom:none;}
.ikey{font-size:11px;color:var(--text2);width:64px;flex-shrink:0;padding-top:2px;}
.ival{font-size:12px;flex:1;word-break:break-all;}
.iinput{font-size:12px;width:100%;border:0.5px solid var(--bdr2);border-radius:4px;padding:2px 6px;background:var(--bg);color:var(--text);outline:none;}
.iinput:focus{border-color:var(--pur);}
.dtog{font-size:11px;color:var(--pur);cursor:pointer;margin-top:6px;display:block;}
.sflow{display:flex;flex-direction:column;gap:4px;}
.snode{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:var(--r-md);border:0.5px solid var(--bdr);font-size:11px;}
.snode.cur{border-color:var(--pur);background:var(--pur-l);}
.snode.done{background:var(--bg2);color:var(--text3);}
.snode.fut{color:var(--text3);}
.sdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.sd-done{background:#1D9E75;}.sd-cur{background:var(--pur);}.sd-fut{background:var(--bdr2);}
.sname{flex:1;font-weight:500;}
.memo-wrap{border-top:0.5px solid var(--bdr);padding-top:8px;margin-top:8px;}
.memo-lbl{font-size:11px;color:var(--text2);margin-bottom:4px;}
.mta{width:100%;min-height:52px;padding:6px 8px;font-size:12px;border:0.5px solid var(--bdr2);border-radius:var(--r-md);background:var(--bg);color:var(--text);outline:none;resize:vertical;line-height:1.5;}
.mta:focus{border-color:var(--pur);}
.tabs{display:flex;border-bottom:0.5px solid var(--bdr);margin-bottom:1rem;overflow-x:auto;}
.tab{height:36px;padding:0 12px;font-size:13px;border:none;background:transparent;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-0.5px;white-space:nowrap;}
.tab.active{color:var(--pur);border-bottom-color:var(--pur);font-weight:500;}
.dpane{display:none;}.dpane.active{display:block;}
.tl{display:flex;flex-direction:column;}
.tli{display:flex;gap:10px;padding-bottom:14px;}
.tli:last-child{padding-bottom:0;}
.tll{display:flex;flex-direction:column;align-items:center;width:16px;flex-shrink:0;}
.tdot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.tline{width:1px;flex:1;background:var(--bdr);margin-top:3px;}
.tg{background:#1D9E75;}.tp{background:var(--pur);}.ta{background:#EF9F27;}.tr2{background:#E24B4A;}.tgr{background:#888780;}
.tdate{font-size:11px;color:var(--text3);}
.ttitle{font-size:13px;font-weight:500;}
.tbody3{font-size:12px;color:var(--text2);margin-top:2px;line-height:1.6;}
.acc{border:0.5px solid var(--bdr);border-radius:var(--r-lg);margin-bottom:8px;overflow:hidden;}
.acc-hd{display:flex;align-items:center;gap:8px;padding:10px 13px;cursor:pointer;background:var(--bg2);user-select:none;}
.acc-hd:hover{background:var(--bg3);}
.acc-chev{font-size:9px;color:var(--text3);transition:transform 0.15s;margin-left:auto;}
.acc-chev.open{transform:rotate(180deg);}
.acc-bd{padding:12px 13px;border-top:0.5px solid var(--bdr);}
.sbar2{margin-bottom:4px;}
.sbar2-hd{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:2px;}
.sbar2-tr{height:4px;background:var(--bdr);border-radius:99px;overflow:hidden;}
.sbar2-fl{height:100%;background:var(--pur);border-radius:99px;}
.asrow{display:flex;align-items:center;gap:7px;margin-bottom:10px;flex-wrap:wrap;}
.asel{height:30px;padding:0 8px;font-size:12px;border:0.5px solid var(--bdr2);border-radius:var(--r-md);background:var(--bg);color:var(--text);outline:none;flex:1;min-width:0;}
.ecard{background:var(--bg);border:0.5px solid var(--bdr);border-radius:var(--r-md);padding:10px 12px;margin-bottom:7px;}
.ehd{display:flex;align-items:center;gap:7px;margin-bottom:7px;flex-wrap:wrap;}
.iav{width:28px;height:28px;border-radius:50%;background:var(--pur-l);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:var(--pur-d);flex-shrink:0;}
.iname{font-size:12px;font-weight:500;}
.irole{font-size:11px;color:var(--text2);}
.idate{font-size:11px;color:var(--text3);margin-left:auto;}
.ebadge{font-size:10px;padding:1px 5px;border-radius:3px;margin-left:4px;background:var(--amb-l);color:var(--amb);}
.starrow{display:flex;gap:2px;align-items:center;margin-bottom:7px;}
.osi{font-size:20px;cursor:pointer;color:var(--bdr2);line-height:1;user-select:none;}
.osi.on{color:#EF9F27;}
.cgrid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:5px;margin-bottom:7px;}
@media(max-width:400px){.cgrid{grid-template-columns:repeat(2,minmax(0,1fr));}}
.citem{background:var(--bg2);border-radius:var(--r-md);padding:6px 8px;}
.clabel{font-size:10px;color:var(--text2);margin-bottom:3px;}
.cstars{display:flex;gap:1px;}
.csi{font-size:14px;cursor:pointer;color:var(--bdr2);user-select:none;}
.csi.on{color:#EF9F27;}
.cmtta{width:100%;min-height:56px;padding:7px 9px;font-size:12px;border:0.5px solid var(--bdr2);border-radius:var(--r-md);background:var(--bg);color:var(--text);outline:none;resize:vertical;line-height:1.5;}
.cmtta:focus{border-color:var(--pur);}
.rbtns{display:flex;gap:5px;margin-top:5px;justify-content:flex-end;}
.asect{margin-top:10px;border-top:0.5px solid var(--bdr);padding-top:10px;}
.asect-lbl{font-size:11px;font-weight:500;color:var(--text2);margin-bottom:5px;}
.mitem{border:0.5px solid var(--bdr);border-radius:var(--r-md);margin-bottom:7px;overflow:hidden;}
.mhd{display:flex;align-items:center;gap:8px;padding:9px 12px;cursor:pointer;}
.mhd:hover{background:var(--bg2);}
.mdir{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.mo{background:var(--pur-l);}.mi{background:var(--grn-l);}
.msubj{font-size:13px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mdt{font-size:11px;color:var(--text3);white-space:nowrap;}
.mchev{font-size:9px;color:var(--text3);transition:transform 0.15s;margin-left:4px;}
.mbody{display:none;padding:10px 12px;border-top:0.5px solid var(--bdr);background:var(--bg2);}
.mmeta{font-size:11px;color:var(--text2);margin-bottom:7px;line-height:1.7;}
.mtext{font-size:12px;line-height:1.7;white-space:pre-wrap;}
.ditem{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:0.5px solid var(--bdr);}
.ditem:last-child{border-bottom:none;}
.dicon{width:28px;height:28px;border-radius:var(--r-md);background:var(--blu-l);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.dname{font-size:12px;font-weight:500;}
.dmeta{font-size:11px;color:var(--text3);}
.ddl{margin-left:auto;height:24px;padding:0 9px;font-size:11px;border:0.5px solid var(--bdr2);border-radius:var(--r-md);background:transparent;color:var(--text2);cursor:pointer;}
.itl-compose{background:var(--bg2);border-radius:var(--r-md);padding:10px 12px;margin-bottom:12px;}
.itl-ta{width:100%;min-height:52px;padding:7px 9px;font-size:13px;border:0.5px solid var(--bdr2);border-radius:var(--r-md);background:var(--bg);color:var(--text);outline:none;resize:none;line-height:1.5;margin-bottom:6px;}
.itl-ta:focus{border-color:var(--pur);}
.itl-foot{display:flex;align-items:center;gap:7px;}
.itl-sel{height:28px;padding:0 8px;font-size:12px;border:0.5px solid var(--bdr2);border-radius:var(--r-md);background:var(--bg);color:var(--text);outline:none;}
.itl-post{height:28px;padding:0 12px;font-size:12px;font-weight:500;background:var(--pur);color:#fff;border:none;border-radius:var(--r-md);cursor:pointer;margin-left:auto;}
.icard{background:var(--bg);border:0.5px solid var(--bdr);border-radius:var(--r-md);padding:9px 11px;margin-bottom:7px;}
.icard-hd{display:flex;align-items:center;gap:7px;margin-bottom:5px;flex-wrap:wrap;}
.iav2{width:26px;height:26px;border-radius:50%;background:var(--pur-l);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;color:var(--pur-d);flex-shrink:0;}
.iwho{font-size:12px;font-weight:500;}
.iwhen{font-size:11px;color:var(--text3);margin-left:auto;}
.itbadge{font-size:10px;padding:1px 6px;border-radius:99px;}
.itn{background:var(--blu-l);color:var(--blu);}.ita{background:var(--pur-l);color:var(--pur-d);}.itu{background:var(--red-l);color:var(--red);}
.itext{font-size:12px;color:var(--text2);line-height:1.6;}
</style>
</head>
<body>

<nav class="navbar">
  <div class="nmark"><svg width="16" height="16" viewBox="0 0 20 20" fill="none"><path d="M10 2L3 6v8l7 4 7-4V6L10 2z" stroke="#fff" stroke-width="1.5" stroke-linejoin="round"/><path d="M10 2v12M3 6l7 4 7-4" stroke="#fff" stroke-width="1.5" stroke-linejoin="round"/></svg></div>
  <span class="ntitle">ATS Portal</span>
  <div class="nspc"></div>
  <span class="nusr" id="nav-user"></span>
  <button class="nbtn" id="logout-btn">ログアウト</button>
</nav>

<div class="det-hdr">
  <button class="btn" id="back-btn">← 一覧に戻る</button>
  <div style="display:flex;gap:7px;flex-wrap:wrap">
    <button class="btn" id="d-mail-btn">メール送付</button>
    <button class="btn" id="d-step-btn">ステップ更新</button>
    <button class="btn pri" id="d-save-btn">保存</button>
  </div>
</div>
<div class="dlayout">
  <div class="dside">
    <div class="card">
      <div class="ph">
        <div class="av" id="d-av"><svg width="24" height="24" viewBox="0 0 32 32" fill="none"><circle cx="16" cy="12" r="6" stroke="#aaa" stroke-width="1.5"/><path d="M4 28c0-6.627 5.373-12 12-12s12 5.373 12 12" stroke="#aaa" stroke-width="1.5" stroke-linecap="round"/></svg></div>
        <input type="file" id="ph-file" accept="image/*" style="display:none"/>
        <div class="ph-hint" id="ph-hint">写真をアップロード</div>
        <div class="pname" id="d-name"></div>
        <div class="pid" id="d-id"></div>
      </div>
      <div id="basic-info"></div>
      <span class="dtog" id="dtog">▶ 詳細情報を表示</span>
      <div id="detail-info" style="display:none;margin-top:4px"></div>
      <div style="display:flex;gap:6px;margin-top:7px;justify-content:flex-end">
        <button class="btn sm" id="info-edit-btn">編集</button>
        <button class="btn sm pri" id="info-save-btn" style="display:none">保存</button>
      </div>
      <div class="memo-wrap">
        <div class="memo-lbl">メモ</div>
        <textarea class="mta" id="d-memo"></textarea>
        <div style="display:flex;justify-content:flex-end"><button class="btn sm pri" id="memo-save" style="margin-top:4px">保存</button></div>
      </div>
    </div>
    <div class="card">
      <div class="card-t">選考ステップ</div>
      <div class="sflow" id="d-sflow"></div>
    </div>
  </div>
  <div>
    <div class="tabs" id="det-tabs">
      <button class="tab active" data-tab="history">選考履歴</button>
      <button class="tab" data-tab="eval">評価</button>
      <button class="tab" data-tab="docs">提出書類</button>
      <button class="tab" data-tab="mail">メール履歴</button>
      <button class="tab" data-tab="itl">社内連絡</button>
    </div>
    <div class="dpane active" id="dpane-history"></div>
    <div class="dpane" id="dpane-eval"></div>
    <div class="dpane" id="dpane-docs"></div>
    <div class="dpane" id="dpane-mail"></div>
    <div class="dpane" id="dpane-itl"></div>
  </div>
</div>

<!-- step modal -->
<div class="overlay" id="mod-step"><div class="mbox">
  <h3>ステップ・ステータス更新</h3>
  <div style="margin-bottom:10px"><div style="font-size:11px;font-weight:500;color:var(--text2);margin-bottom:5px">選考ステップ</div><div class="olist" id="sm-steps"></div></div>
  <div><div style="font-size:11px;font-weight:500;color:var(--text2);margin-bottom:5px">ステータス</div><div class="olist" id="sm-statuses"></div></div>
  <div class="macts"><button class="btn" id="sm-cancel">キャンセル</button><button class="btn pri" id="sm-ok">更新する</button></div>
</div></div>
<!-- mail modal -->
<div class="overlay" id="mod-mail"><div class="mbox">
  <h3>メールテンプレート選択</h3>
  <input class="msearch" id="mail-search" placeholder="テンプレートを検索..."/>
  <div id="mail-list"></div>
  <div class="macts"><button class="btn" id="mail-cancel">キャンセル</button><button class="btn pri" id="mail-ok">送付する</button></div>
</div></div>
<div class="toast" id="toast"></div>

function renderInfoRows(arr) {
  return arr.map(r => {
    if(editingInfo) return `<div class="irow"><span class="ikey">${r.k}</span><input class="iinput" id="iinput-${r.f}" value="${(r.rawV!==undefined?r.rawV:r.v).toString().replace(/"/g,'&quot;')}"/></div>`;
    return `<div class="irow"><span class="ikey">${r.k}</span><span class="ival">${r.v}</span></div>`;
  }).join("");
}
function renderBasicInfo() {
  const rows=[
    {k:"性別",f:"gender",v:`<span class="${d.gender==="男"?"gm":"gf"}">${d.gender}</span>`,rawV:d.gender},
    {k:"年齢",f:"age",v:d.age+"歳",rawV:d.age},
    {k:"応募求人",f:"job",v:d.job,rawV:d.job},
    ...d.basic,
    {k:"タグ",f:"tags",v:d.tags.length?d.tags.map(t=>`<span class="tag ${TAG_CLS[t]||""}">${t}</span>`).join(""):"―",rawV:d.tags.join("/")}
  ];
  G("basic-info").innerHTML=renderInfoRows(rows);
}
function renderDetailInfo() { G("detail-info").innerHTML=renderInfoRows(d.detail); }
function renderStepFlow() {
  const idx=STEP_ORD[d.step]||0;
  G("d-sflow").innerHTML=STEPS.map((s,i)=>{
    const ord=i+1,isCur=d.step===s,isDone=idx>ord;
    const cls=isCur?"snode cur":isDone?"snode done":"snode fut";
    const dot=isCur?"sd-cur":isDone?"sd-done":"sd-fut";
    const badge=isCur?`<span class="badge ${ST_CLS[d.status]||""}" style="font-size:10px">${d.status}</span>`:"";
    return `<div class="${cls}"><div class="sdot ${dot}"></div><div class="sname">${s}</div>${badge}</div>`;
  }).join("");
}
function renderHistory() {
  G("dpane-history").innerHTML=`<div class="tl">${
    d.history.map((h,i)=>`<div class="tli">
      <div class="tll"><div class="tdot ${h.c}"></div>${i<d.history.length-1?'<div class="tline"></div>':""}</div>
      <div><div class="tdate">${h.date}</div><div class="ttitle">${h.title}</div>${h.body?`<div class="tbody3">${h.body}</div>`:""}</div>
    </div>`).join("")
  }</div>`;
}
function calcStepScore(step) {
  const e=d.evals[step]; if(!e||!e.ivs||!e.ivs.length) return null;
  return (e.ivs.reduce((a,iv)=>a+iv.overall,0)/e.ivs.length).toFixed(1);
}
function calcCritAvg(step) {
  const e=d.evals[step]; if(!e||!e.ivs||!e.ivs.length) return {};
  const m={};
  e.ivs.forEach(iv=>Object.entries(iv.crit).forEach(([k,v])=>{if(!m[k])m[k]={s:0,n:0};m[k].s+=v;m[k].n++;}));
  const out={};Object.entries(m).forEach(([k,{s,n}])=>out[k]=(s/n).toFixed(1));return out;
}
function renderEval() {
  G("dpane-eval").innerHTML=STEPS.map((s,si)=>{
    if(!d.evals[s]) d.evals[s]={ivs:[],adminComment:""};
    const e=d.evals[s], isOpen=openAccs.has(s), score=calcStepScore(s);
    return `<div class="acc" id="acc-${si}">
      <div class="acc-hd" id="acchd-${si}">
        <span class="stepb ${STEP_CLS[s]||""}">${s}</span>
        <span style="font-size:11px;color:var(--text3);margin-left:4px">${score?"avg "+score:"未評価"}</span>
        <span style="flex:1"></span>
        <span style="font-size:11px;color:var(--text3)">${e.ivs.length}名</span>
        <span class="acc-chev${isOpen?" open":""}" id="chev-${si}">▼</span>
      </div>
      <div class="acc-bd" id="accbd-${si}" style="display:${isOpen?"block":"none"}">
        ${renderAccBody(s,si)}
      </div>
    </div>`;
  }).join("");
  STEPS.forEach((s,si)=>{
    G("acchd-"+si).addEventListener("click",()=>{
      const bd=G("accbd-"+si),chev=G("chev-"+si);
      if(bd.style.display==="block"){bd.style.display="none";chev.classList.remove("open");openAccs.delete(s);}
      else{bd.style.display="block";chev.classList.add("open");openAccs.add(s);}
    });
    wireAccEvents(s,si);
  });
}
function renderAccBody(s,si) {
  if(!d.evals[s]) d.evals[s]={ivs:[],adminComment:""};
  const e=d.evals[s], avg=calcCritAvg(s);
  const bars=Object.keys(avg).length?`<div style="margin-bottom:10px">${Object.entries(avg).map(([k,v])=>`<div class="sbar2"><div class="sbar2-hd"><span>${k}</span><span>${v}</span></div><div class="sbar2-tr"><div class="sbar2-fl" style="width:${parseFloat(v)/5*100}%"></div></div></div>`).join("")}</div>`:"";
  const ivHtml=e.ivs.length?e.ivs.map((iv,ii)=>renderIVCard(s,si,iv,ii)).join(""):
    `<div style="font-size:12px;color:var(--text3);margin-bottom:8px">評価がありません</div>`;
  return `${bars}
  <div class="asrow">
    <span style="font-size:12px;color:var(--text2);white-space:nowrap">面接官を追加</span>
    <select class="asel" id="asel-${si}">
      <option value="">選択してください</option>
      ${AVAIL_IV.map(n=>`<option value="${n}">${n}</option>`).join("")}
    </select>
    <button class="btn sm pri" id="assign-${si}">追加</button>
  </div>
  <div id="ivlist-${si}">${ivHtml}</div>
  <div class="asect">
    <div class="asect-lbl">管理者コメント</div>
    <textarea class="cmtta" id="adcmt-${si}">${e.adminComment||""}</textarea>
    <div class="rbtns"><button class="btn sm pri" id="adcmtsave-${si}">保存</button></div>
  </div>`;
}
function renderIVCard(s,si,iv,ii) {
  const ov=iv.overall||0;
  const stars=Array.from({length:5},(_,i)=>`<span class="osi${i<ov?" on":""}" id="osi-${s}-${ii}-${i+1}">★</span>`).join("");
  const crits=Object.entries(iv.crit).map(([k,v])=>{
    const v2=v||0;
    const cs=Array.from({length:5},(_,i)=>`<span class="csi${i<v2?" on":""}" id="csi-${s}-${ii}-${k}-${i+1}">★</span>`).join("");
    return `<div class="citem"><div class="clabel">${k}</div><div class="cstars">${cs}</div></div>`;
  }).join("");
  return `<div class="ecard">
    <div class="ehd">
      <div class="iav">${iv.ini}</div>
      <div><div class="iname">${iv.name}<span class="ebadge">編集可</span></div><div class="irole">${iv.role}</div></div>
      <div class="idate">${iv.date}</div>
    </div>
    <div class="starrow">${stars}<span style="font-size:12px;font-weight:500;margin-left:5px" id="oscore-${s}-${ii}">${ov}.0</span></div>
    <div class="cgrid">${crits}</div>
    <textarea class="cmtta" id="cmt-${s}-${ii}">${iv.comment||""}</textarea>
    <div class="rbtns">
      <button class="btn sm pri" id="cmtsave-${s}-${ii}">保存</button>
      <button class="btn sm danger" id="ivdel-${s}-${si}-${ii}">削除</button>
    </div>
  </div>`;
}
function wireAccEvents(s,si) {
  const assignBtn=G("assign-"+si);
  if(assignBtn) assignBtn.addEventListener("click",()=>assignIV(s,si));
  const adBtn=G("adcmtsave-"+si);
  if(adBtn) adBtn.addEventListener("click",()=>{const el=G("adcmt-"+si);if(el)d.evals[s].adminComment=el.value;showToast("保存しました");});
  if(!d.evals[s]) return;
  d.evals[s].ivs.forEach((iv,ii)=>{
    for(let v=1;v<=5;v++){const el=G(`osi-${s}-${ii}-${v}`);if(el)el.addEventListener("click",()=>{d.evals[s].ivs[ii].overall=v;refreshAcc(s,si);});}
    Object.keys(iv.crit).forEach(k=>{for(let v=1;v<=5;v++){const el=G(`csi-${s}-${ii}-${k}-${v}`);if(el)el.addEventListener("click",()=>{d.evals[s].ivs[ii].crit[k]=v;refreshAcc(s,si);});}});
    const csave=G(`cmtsave-${s}-${ii}`);if(csave)csave.addEventListener("click",()=>{const el=G(`cmt-${s}-${ii}`);if(el)d.evals[s].ivs[ii].comment=el.value;showToast("保存しました");});
    const del=G(`ivdel-${s}-${si}-${ii}`);if(del)del.addEventListener("click",()=>{d.evals[s].ivs.splice(ii,1);showToast("削除しました");refreshAcc(s,si);});
  });
}
function assignIV(s,si) {
  const sel=G("asel-"+si),full=sel.value;if(!full){showToast("面接官を選択してください");return;}
  const name=full.split("（")[0],role=(full.match(/（(.+?)）/)||[])[1]||"";
  if(!d.evals[s]) d.evals[s]={ivs:[],adminComment:""};
  if(d.evals[s].ivs.find(iv=>iv.name===name)){showToast("すでにアサイン済みです");return;}
  d.evals[s].ivs.push({name,ini:name.slice(0,1),role,date:new Date().toISOString().slice(0,10),overall:0,crit:{技術力:0,コミュ力:0,カルチャー:0},comment:""});
  sel.value=""; showToast(name+" をアサインしました"); refreshAcc(s,si);
}
function refreshAcc(s,si) {
  const bd=G("accbd-"+si);if(!bd)return;
  if(!d.evals[s]) d.evals[s]={ivs:[],adminComment:""};
  const e=d.evals[s],avg=calcCritAvg(s);
  const bars=Object.keys(avg).length?`<div style="margin-bottom:10px">${Object.entries(avg).map(([k,v])=>`<div class="sbar2"><div class="sbar2-hd"><span>${k}</span><span>${v}</span></div><div class="sbar2-tr"><div class="sbar2-fl" style="width:${parseFloat(v)/5*100}%"></div></div></div>`).join("")}</div>`:"";
  const ivHtml=e.ivs.length?e.ivs.map((iv,ii)=>renderIVCard(s,si,iv,ii)).join(""):
    `<div style="font-size:12px;color:var(--text3);margin-bottom:8px">評価がありません</div>`;
  bd.innerHTML=`${bars}<div class="asrow"><span style="font-size:12px;color:var(--text2);white-space:nowrap">面接官を追加</span><select class="asel" id="asel-${si}"><option value="">選択してください</option>${AVAIL_IV.map(n=>`<option value="${n}">${n}</option>`).join("")}</select><button class="btn sm pri" id="assign-${si}">追加</button></div><div id="ivlist-${si}">${ivHtml}</div><div class="asect"><div class="asect-lbl">管理者コメント</div><textarea class="cmtta" id="adcmt-${si}">${e.adminComment||""}</textarea><div class="rbtns"><button class="btn sm pri" id="adcmtsave-${si}">保存</button></div></div>`;
  wireAccEvents(s,si);
  const sc=calcStepScore(s);
  const hd=document.querySelector(`#acc-${si} .acc-hd span:nth-child(2)`);if(hd)hd.textContent=sc?"avg "+sc:"未評価";
  const cnt=document.querySelector(`#acc-${si} .acc-hd span:nth-child(4)`);if(cnt)cnt.textContent=e.ivs.length+"名";
}
function renderDocs() {
  G("dpane-docs").innerHTML=d.docs.length?d.docs.map(doc=>`
    <div class="ditem">
      <div class="dicon"><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="2" y="1" width="9" height="13" rx="1" stroke="currentColor" stroke-width="1.2"/><path d="M5 5h5M5 8h5M5 11h3" stroke="currentColor" stroke-width="1" stroke-linecap="round"/></svg></div>
      <div><div class="dname">${doc.name}</div><div class="dmeta">${doc.type} · ${doc.size} · ${doc.date}</div></div>
      <button class="ddl" data-name="${doc.name}">DL</button>
    </div>`).join(""):`<div style="font-size:13px;color:var(--text3)">書類がありません</div>`;
  G("dpane-docs").querySelectorAll(".ddl").forEach(btn=>btn.addEventListener("click",()=>showToast(btn.dataset.name+"をダウンロードしました")));
}
function renderMailsPane() {
  if(!d.mails.length){G("dpane-mail").innerHTML=`<div style="font-size:13px;color:var(--text3)">メール履歴がありません</div>`;return;}
  G("dpane-mail").innerHTML=d.mails.map((m,i)=>`
    <div class="mitem">
      <div class="mhd" data-mi="${i}">
        <div class="mdir ${m.dir==="out"?"mo":"mi"}">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
            ${m.dir==="out"?'<path d="M3 13L13 3M13 3H7M13 3v6" stroke="#3C3489" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>':'<path d="M13 3L3 13M3 13h6M3 13V7" stroke="#085041" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>'}
          </svg>
        </div>
        <div class="msubj">${m.subj}</div><div class="mdt">${m.date}</div>
        <div class="mchev" id="mchev-${i}">▼</div>
      </div>
      <div class="mbody" id="mbody-${i}">
        <div class="mmeta">差出人: ${m.from}<br>宛先: ${m.to}</div>
        <div class="mtext">${m.body}</div>
      </div>
    </div>`).join("");
  G("dpane-mail").querySelectorAll(".mhd[data-mi]").forEach(el=>{
    el.addEventListener("click",()=>{
      const b=G("mbody-"+el.dataset.mi),c=G("mchev-"+el.dataset.mi);
      const open=b.style.display==="block"; b.style.display=open?"none":"block"; c.style.transform=open?"":"rotate(180deg)";
    });
  });
}
function renderITL() {
  G("dpane-itl").innerHTML=`
    <div class="itl-compose">
      <textarea class="itl-ta" id="itl-ta" placeholder="社内連絡・申し送り・相談事項を入力..."></textarea>
      <div class="itl-foot">
        <select class="itl-sel" id="itl-sel"><option value="notify">連絡</option><option value="discuss">相談</option><option value="urgent">至急</option></select>
        <button class="itl-post" id="itl-post">投稿</button>
      </div>
    </div>
    <div id="itl-posts">${renderITLPosts()}</div>`;
  G("itl-post").addEventListener("click",()=>{
    const ta=G("itl-ta"),txt=ta.value.trim();if(!txt){showToast("内容を入力してください");return;}
    const now=new Date(),ts=now.toISOString().slice(0,10)+" "+now.toTimeString().slice(0,5);
    d.itl.unshift({who:"管理者",ini:"管",type:G("itl-sel").value,text:txt,time:ts});
    ta.value=""; G("itl-posts").innerHTML=renderITLPosts(); wireITLDel();
    showToast("投稿しました");
  });
  wireITLDel();
}
function renderITLPosts() {
  return d.itl.map((p,i)=>`
    <div class="icard"><div class="icard-hd">
      <div class="iav2">${p.ini}</div><span class="iwho">${p.who}</span>
      <span class="itbadge ${ITL_TYPE[p.type]?.cls||"itn"}">${ITL_TYPE[p.type]?.label||p.type}</span>
      <span class="iwhen">${p.time}</span>
      <button class="btn sm danger itl-del" data-i="${i}">削除</button>
    </div><div class="itext">${p.text}</div></div>`).join("")||`<div style="font-size:13px;color:var(--text3)">投稿がありません</div>`;
}
function wireITLDel() {
  document.querySelectorAll(".itl-del").forEach(btn=>btn.addEventListener("click",()=>{
    d.itl.splice(parseInt(btn.dataset.i),1); G("itl-posts").innerHTML=renderITLPosts(); wireITLDel(); showToast("削除しました");
  }));
}
function openStepModal() {
  selStep2=d.step; selStatus2=d.status; renderStepModal(); openMod("mod-step");
}
function renderStepModal() {
  G("sm-steps").innerHTML=STEPS.map(s=>`<div class="oitem${selStep2===s?" sel":""}" data-sv="${s}"><input type="radio" ${selStep2===s?"checked":""} readonly/><span class="stepb ${STEP_CLS[s]||""}">${s}</span></div>`).join("");
  G("sm-statuses").innerHTML=STATUSES.map(s=>`<div class="oitem${selStatus2===s?" sel":""}" data-sv="${s}"><input type="radio" ${selStatus2===s?"checked":""} readonly/><span class="badge ${ST_CLS[s]||""}">${s}</span></div>`).join("");
  G("sm-steps").querySelectorAll(".oitem").forEach(el=>el.addEventListener("click",()=>{selStep2=el.dataset.sv;renderStepModal();}));
  G("sm-statuses").querySelectorAll(".oitem").forEach(el=>el.addEventListener("click",()=>{selStatus2=el.dataset.sv;renderStepModal();}));
}
function openMailModal() { selMailTpl=null; G("mail-search").value=""; renderMailModal(); openMod("mod-mail"); }
function renderMailModal() {
  const q=G("mail-search").value.toLowerCase();
  G("mail-list").innerHTML=MAIL_TPLS.filter(t=>t.name.includes(q)||t.desc.includes(q)).map(t=>
    `<div class="titem${selMailTpl===t.id?" sel":""}" data-tid="${t.id}"><div class="tn">${t.name}</div><div class="td2">${t.desc}</div></div>`
  ).join("");
  G("mail-list").querySelectorAll(".titem").forEach(el=>el.addEventListener("click",()=>{selMailTpl=el.dataset.tid;renderMailModal();}));
}
</script>
</body>
</html>
