<title>ATS Portal - ログイン</title>
<style>

*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a18;min-height:100vh;}
:root{
  --bg:#fff;--bg2:#f5f5f3;--bg3:#eeecea;
  --text:#1a1a18;--text2:#6b6b68;--text3:#a0a09c;
  --bdr:rgba(0,0,0,0.12);--bdr2:rgba(0,0,0,0.22);
  --pur:#534AB7;--pur-d:#3C3489;--pur-l:#EEEDFE;
  --grn-l:#E1F5EE;--grn:#085041;
  --red-l:#FCEBEB;--red:#791F1F;
  --amb-l:#FAEEDA;--amb:#633806;
  --blu-l:#E6F1FB;--blu:#0C447C;
  --gry-l:#F1EFE8;--gry:#444441;
  --r-md:8px;--r-lg:12px;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2b;--text:#f0ede8;--text2:#a8a8a4;--text3:#6b6b68;--bdr:rgba(255,255,255,0.1);--bdr2:rgba(255,255,255,0.2);}
}
.btn{height:34px;padding:0 14px;font-size:13px;border:0.5px solid var(--bdr2);border-radius:var(--r-md);background:var(--bg);color:var(--text);cursor:pointer;white-space:nowrap;display:inline-flex;align-items:center;gap:6px;}
.btn:hover{background:var(--bg2);}
.btn.pri{background:var(--pur);color:#fff;border-color:var(--pur);}
.btn.pri:hover{background:var(--pur-d);}
.btn.sm{height:28px;font-size:12px;padding:0 10px;}
.btn.danger{color:#A32D2D;border-color:#F09595;}
.btn.danger:hover{background:var(--red-l);}
.badge{display:inline-block;font-size:11px;padding:2px 7px;border-radius:99px;white-space:nowrap;}
.stepb{display:inline-block;font-size:11px;padding:2px 7px;border-radius:4px;white-space:nowrap;}
.step-doc{background:var(--blu-l);color:var(--blu);}
.step-written{background:var(--pur-l);color:var(--pur-d);}
.step-1st{background:var(--amb-l);color:var(--amb);}
.step-2nd{background:#FAC775;color:var(--amb);}
.step-final{background:#FAECE7;color:#712B13;}
.step-offer{background:var(--grn-l);color:var(--grn);}
.st-pass{background:var(--grn-l);color:var(--grn);}
.st-fail{background:var(--red-l);color:var(--red);}
.st-hold{background:var(--gry-l);color:var(--gry);}
.st-new{background:var(--blu-l);color:var(--blu);}
.st-wd{background:#FBEAF0;color:#72243E;}
.tag{display:inline-block;font-size:11px;padding:2px 6px;border-radius:99px;margin:1px;}
.t-eng{background:var(--pur-l);color:var(--pur-d);}
.t-hr{background:var(--grn-l);color:var(--grn);}
.t-hot{background:#FAECE7;color:#712B13;}
.t-keep{background:var(--amb-l);color:var(--amb);}
.gm{color:#185FA5;font-weight:500;}.gf{color:#993556;font-weight:500;}
.navbar{height:52px;background:var(--bg);border-bottom:0.5px solid var(--bdr);display:flex;align-items:center;padding:0 1.25rem;gap:12px;position:sticky;top:0;z-index:50;}
.nmark{width:28px;height:28px;background:var(--pur);border-radius:6px;display:flex;align-items:center;justify-content:center;}
.ntitle{font-size:15px;font-weight:500;color:var(--text);}
.nspc{flex:1;}
.nusr{font-size:13px;color:var(--text2);}
.nbtn{height:30px;padding:0 12px;font-size:12px;border:0.5px solid var(--bdr2);border-radius:var(--r-md);background:transparent;color:var(--text2);cursor:pointer;}
.nbtn:hover{background:var(--bg2);}
.abody{padding:1.25rem;max-width:1200px;margin:0 auto;}
.toast{display:none;position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#2C2C2A;color:#F1EFE8;font-size:12px;padding:9px 18px;border-radius:var(--r-md);white-space:nowrap;z-index:9999;}
.toast.show{display:block;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;align-items:flex-start;justify-content:center;padding:40px 16px;}
.overlay.open{display:flex;}
.mbox{background:var(--bg);border:0.5px solid var(--bdr);border-radius:var(--r-lg);padding:1.25rem;width:100%;max-width:440px;max-height:calc(100vh - 80px);overflow-y:auto;}
.mbox h3{font-size:15px;font-weight:500;margin-bottom:1rem;}
.mtabs{display:grid;gap:4px;margin-bottom:1rem;}
.mtab{height:30px;font-size:12px;border:0.5px solid var(--bdr2);border-radius:var(--r-md);background:var(--bg);color:var(--text2);cursor:pointer;padding:0 4px;}
.mtab.active{background:var(--pur);color:#fff;border-color:var(--pur);}
.msearch{width:100%;height:32px;padding:0 10px;font-size:13px;border:0.5px solid var(--bdr2);border-radius:var(--r-md);background:var(--bg2);color:var(--text);outline:none;margin-bottom:8px;}
.msearch:focus{border-color:var(--pur);}
.olist{display:flex;flex-direction:column;gap:3px;max-height:180px;overflow-y:auto;}
.oitem{display:flex;align-items:center;gap:8px;padding:6px 10px;border:0.5px solid var(--bdr);border-radius:var(--r-md);cursor:pointer;font-size:13px;}
.oitem:hover{background:var(--bg2);}
.oitem.sel{background:var(--pur-l);border-color:#AFA9EC;}
.oitem input[type=radio]{width:13px;height:13px;accent-color:var(--pur);flex-shrink:0;}
.taggrid{display:flex;flex-wrap:wrap;gap:8px;padding:4px 0;}
.tagopt{padding:6px 12px;border:0.5px solid var(--bdr2);border-radius:99px;cursor:pointer;font-size:13px;color:var(--text2);}
.tagopt.tadd{background:var(--pur);color:#fff;border-color:var(--pur);}
.tagopt.tremove{background:var(--red-l);color:#A32D2D;border-color:#F09595;}
.macts{display:flex;gap:8px;margin-top:1rem;justify-content:flex-end;}
.titem,.fitem{padding:8px 10px;border:0.5px solid var(--bdr);border-radius:var(--r-md);cursor:pointer;margin-bottom:4px;}
.titem:hover,.fitem:hover{background:var(--bg2);}
.titem.sel,.fitem.sel{background:var(--pur-l);border-color:#AFA9EC;}
.tn,.fn{font-size:13px;font-weight:500;}
.td2,.fd{font-size:11px;color:var(--text2);margin-top:2px;}

body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg2);}
.lcard{background:var(--bg);border:0.5px solid var(--bdr);border-radius:var(--r-lg);padding:2rem 2.5rem;width:100%;max-width:380px;}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:2rem;}
.lmark{width:36px;height:36px;background:var(--pur);border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;}
.ltxt{font-size:18px;font-weight:500;}
.lsub{font-size:12px;color:var(--text2);}
.lcard h2{font-size:20px;font-weight:500;margin-bottom:4px;}
.lcard p{font-size:13px;color:var(--text2);margin-bottom:1.5rem;}
.field{margin-bottom:1rem;}
.field label{display:block;font-size:13px;color:var(--text2);margin-bottom:5px;}
.field input{width:100%;height:40px;padding:0 12px;border:0.5px solid var(--bdr2);border-radius:var(--r-md);background:var(--bg);color:var(--text);font-size:14px;outline:none;}
.field input:focus{border-color:var(--pur);box-shadow:0 0 0 3px rgba(83,74,183,0.1);}
.lerr{display:none;font-size:12px;color:#A32D2D;background:var(--red-l);border:0.5px solid #F09595;border-radius:var(--r-md);padding:8px 12px;margin-bottom:1rem;}
.lbtn{width:100%;height:40px;background:var(--pur);color:#fff;border:none;border-radius:var(--r-md);font-size:14px;font-weight:500;cursor:pointer;}
.lbtn:hover{background:var(--pur-d);}
</style>
</head>

document.getElementById("l-btn").addEventListener("click", doLogin);
document.getElementById("l-pass").addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
function doLogin() {
  const u = document.getElementById("l-user").value.trim();
  const p = document.getElementById("l-pass").value;
  if (USERS[u] && USERS[u] === p) {
    sessionStorage.setItem("ats_user", u);
    window.location.href = "list.html";
  } else {
    document.getElementById("lerr").style.display = "block";
    document.getElementById("l-pass").value = "";
    document.getElementById("l-pass").focus();
  }
}
</script>
